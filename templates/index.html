<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACK LUCKY JET ALGORITHME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-color: #00ff41; 
            --bg-dark: #050505;
        }
        body {
            background-color: var(--bg-dark);
            font-family: 'Fira Code', monospace;
            color: var(--glow-color);
            background-image: radial-gradient(#003b00 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }
        .terminal-box {
            border: 1px solid var(--glow-color);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.25);
            background: rgba(0, 0, 0, 0.95);
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.08);
            position: absolute;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }
        .title-glow {
            text-shadow: 0 0 12px var(--glow-color);
        }
        .btn-hack {
            border: 1px solid var(--glow-color);
            transition: all 0.3s;
        }
        .btn-hack:hover:not(:disabled) {
            background: var(--glow-color);
            color: black;
            box-shadow: 0 0 20px var(--glow-color);
        }
        .btn-hack:disabled {
            opacity: 0.3;
            cursor: wait;
        }
        #log-area::-webkit-scrollbar { width: 5px; }
        #log-area::-webkit-scrollbar-thumb { background: var(--glow-color); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">
    <div class="scanline"></div>

    <div class="w-full max-w-2xl terminal-box rounded-lg overflow-hidden relative">
        <div class="bg-[#00ff4111] px-4 py-2 border-b border-[#00ff4133] flex justify-between items-center text-[10px] tracking-tighter">
            <div class="flex gap-2">
                <span class="w-2 h-2 rounded-full bg-red-500/80"></span>
                <span class="w-2 h-2 rounded-full bg-yellow-500/80"></span>
                <span class="w-2 h-2 rounded-full bg-green-500/80"></span>
            </div>
            <span>SYS_CORE@LUCKYJET:~/COTE_D_IVOIRE</span>
            <span id="live-clock" class="font-bold">--:--:--</span>
        </div>

        <div class="p-6 space-y-6">
            
            <div class="text-center border-b border-[#00ff4122] pb-4">
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-widest title-glow uppercase">
                    HACK LUCKY JET ALGORITHME
                </h1>
                <p class="text-[9px] opacity-60 mt-1 tracking-[0.3em]">RECHERCHE DE VULNÉRABILITÉ DES FLUX DE SÉCURITÉ</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2 border border-[#00ff4133] p-6 flex flex-col items-center justify-center relative bg-black/40">
                    <span class="absolute top-1 left-2 text-[9px] opacity-40">TARGET_ODDS</span>
                    <div id="odds-display" class="text-7xl font-bold tracking-tighter title-glow">1.00x</div>
                </div>
                
                <div class="space-y-3">
                    <div class="border border-[#00ff4133] p-3 bg-black/40">
                        <span class="block text-[9px] opacity-40">PRECISION_RATE</span>
                        <span id="confidence-display" class="text-xl font-bold">--%</span>
                    </div>
                    <div class="border border-[#00ff4133] p-3 bg-black/40">
                        <span class="block text-[9px] opacity-40">SERVER_ZONE</span>
                        <span class="text-sm font-bold">ABIDJAN, CI</span>
                    </div>
                </div>
            </div>

            <div id="log-area" class="bg-black/80 border border-[#00ff4133] h-32 p-3 text-[10px] overflow-y-auto font-mono space-y-1 opacity-80">
                <p class="text-white/40">> [SYSTEM] STANDBY — WAITING FOR INTEGRITY SYNC...</p>
            </div>

            <button id="predict-btn" onclick="runHack()" class="w-full py-4 text-sm font-bold tracking-[0.2em] btn-hack uppercase active:scale-95 bg-black" disabled>
                INITIALISATION DU CYCLE... (30s)
            </button>
        </div>

        <div class="text-[8px] text-center pb-4 opacity-30 uppercase tracking-widest">
            STRICTLY CONFIDENTIAL — UNUATHORIZED REPRODUCTION IS LOGGED
        </div>
    </div>

    <script>
        let cooldownActive = false;

        // Horloge calée sur la timezone Côte d'Ivoire
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('fr-FR', {timeZone: 'Africa/Abidjan'});
        }, 1000);

        window.onload = () => startCooldown(30);

        function addLog(message, type = 'INFO') {
            const logArea = document.getElementById('log-area');
            const p = document.createElement('p');
            p.innerText = `> [${type}] ${message}`;
            if(type === 'SUCCESS') p.className = "text-emerald-400";
            if(type === 'PENDING') p.className = "text-amber-400 animate-pulse";
            logArea.appendChild(p);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function startCooldown(seconds) {
            cooldownActive = true;
            const btn = document.getElementById('predict-btn');
            let timeLeft = seconds;

            btn.disabled = true;
            addLog(`SYSLOG DECOOLDOWN ENGAGED: ${seconds}s`, 'PENDING');

            const timer = setInterval(() => {
                timeLeft--;
                btn.innerText = `PROCHAIN SIGNAL : ${timeLeft}S`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    cooldownActive = false;
                    btn.disabled = false;
                    btn.innerText = "INJECTER L'ALGORITHME";
                    addLog("VULNERABILITY PIPELINE CLEAR — READY", "SUCCESS");
                }
            }, 1000);
        }

        function runHack() {
            if (cooldownActive) return;
            
            const btn = document.getElementById('predict-btn');
            const oddsDisplay = document.getElementById('odds-display');

            btn.disabled = true;
            btn.innerText = "INJECTION EN COURS...";
            
            addLog("DECRYPTING INTERCEPTED PACKETS...", "INFO");
            addLog("EXTRACTING SEED VALUE FROM CLOUD...", "INFO");
            
            fetch('/api/predict')
                .then(res => res.json())
                .then(data => {
                    setTimeout(() => {
                        animateOdds(parseFloat(data.predicted_odds));
                        document.getElementById('confidence-display').innerText = data.confidence;
                        addLog(`TARGET HIT: ${data.predicted_odds}x INTERCEPTED AT ${data.timestamp}`, "SUCCESS");
                        startCooldown(30);
                    }, 1400);
                })
                .catch(() => {
                    addLog("INJECTION FAILURE — COOLDOWN RESTRICTION", "ERROR");
                    startCooldown(5);
                });
        }

        function animateOdds(target) {
            let current = 1.00;
            const step = (target - 1.00) / 45;
            const timer = setInterval(() => {
                current += step;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                document.getElementById('odds-display').innerText = current.toFixed(2) + 'x';
            }, 25);
        }
    </script>
</body>
</html>
